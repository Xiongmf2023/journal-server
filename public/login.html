<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>个人日志本 - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;background:#f5f3f0;color:#2d2a24;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:40px 32px;box-shadow:0 4px 24px rgba(0,0,0,0.08);width:100%;max-width:380px;text-align:center}
.login-icon{width:56px;height:56px;background:#5a4f42;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.login-icon svg{width:28px;height:28px;fill:none;stroke:#fff;stroke-width:1.8}
.login-card h1{font-size:22px;font-weight:700;color:#3d3529;margin-bottom:6px}
.login-card p{font-size:14px;color:#9a9082;margin-bottom:28px}
.form-group{margin-bottom:18px;text-align:left}
.form-group label{display:block;font-size:13px;font-weight:600;color:#6b6256;margin-bottom:6px}
.form-group input[type=password]{width:100%;padding:12px 16px;border:1.5px solid #e8e4de;border-radius:12px;font-size:16px;background:#fcfcfa;transition:border-color .2s;outline:none}
.form-group input[type=password]:focus{border-color:#b8a99a}
.login-btn{width:100%;padding:13px;background:#5a4f42;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s}
.login-btn:hover{background:#4a3f34}
.login-btn:disabled{background:#c8beae;cursor:not-allowed}
.error-msg{color:#c74b47;font-size:14px;margin-top:12px;display:none}
.error-msg.show{display:block}
.loading{display:none;align-items:center;justify-content:center;gap:8px;margin-top:12px}
.loading.show{display:flex}
.spinner{width:18px;height:18px;border:2px solid #e8e4de;border-top-color:#5a4f42;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-text{font-size:12px;color:#c8beae;margin-top:24px}
</style>
</head>
<body>
<div class="login-card">
<div class="login-icon">
<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
<path d="M12 2L2 7l10 5 10-5-10-5z"/>
<path d="M2 17l10 5 10-5"/>
<path d="M2 12l10 5 10-5"/>
</svg>
</div>
<h1>个人日志本</h1>
<p>输入密码以继续</p>
<div class="form-group">
<label for="passwordInput">密码</label>
<input type="password" id="passwordInput" placeholder="请输入密码" autocomplete="current-password" autofocus>
</div>
<button class="login-btn" id="loginBtn">解锁</button>
<div class="error-msg" id="errorMsg"></div>
<div class="loading" id="loadingIndicator">
<div class="spinner"></div>
<span style="color:#9a9082;font-size:14px">验证中...</span>
</div>
<div class="footer-text">记录每一天的珍贵瞬间</div>
</div>
<script>
var passwordInput = document.getElementById('passwordInput');
var loginBtn = document.getElementById('loginBtn');
var errorMsg = document.getElementById('errorMsg');
var loadingIndicator = document.getElementById('loadingIndicator');

passwordInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
loginBtn.addEventListener('click', doLogin);

function doLogin() {
  var password = passwordInput.value.trim();
  if (!password) {
    showError('请输入密码');
    passwordInput.focus();
    return;
  }

  loginBtn.disabled = true;
  loadingIndicator.classList.add('show');
  errorMsg.classList.remove('show');

  fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: password })
  })
  .then(function(r) {
    if (r.ok) return r.json();
    return r.json().then(function(d) { throw new Error(d.error || '密码错误'); });
  })
  .then(function() {
    // Redirect to the main app
    window.location.href = '/';
  })
  .catch(function(err) {
    showError(err.message || '密码错误，请重试');
    loginBtn.disabled = false;
    loadingIndicator.classList.remove('show');
    passwordInput.value = '';
    passwordInput.focus();
  });
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('show');
}
</script>
</body>
</html>
